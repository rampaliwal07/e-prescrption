<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sanjivani Hospital | e-Prescription - Dr. Pankaj Patil</title>
  <!-- Google Fonts for clean medical style -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef5f0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.5rem;
      color: #1a2c2c;
    }

    /* main container */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header hospital & doctor card */
    .hospital-header {
      background: linear-gradient(135deg, #0f5c5c 0%, #0a4747 100%);
      color: white;
      border-radius: 28px;
      padding: 1.6rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 25px rgba(0, 32, 32, 0.1);
    }

    .hospital-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
    }

    .hospital-location {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-bottom: 0.75rem;
      font-weight: 400;
    }

    .doctor-details {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.25);
      padding-top: 1rem;
      gap: 0.8rem;
    }

    .doctor-name {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .doctor-spec, .doctor-contact {
      font-size: 0.9rem;
      background: rgba(255,255,255,0.15);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
    }

    /* card style for forms */
    .form-card {
      background: white;
      border-radius: 28px;
      padding: 1.8rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #e2efe7;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f5c5c;
      border-left: 5px solid #2c9c6e;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f5444;
      letter-spacing: 0.3px;
    }

    .required:after {
      content: "*";
      color: #d9534f;
      margin-left: 4px;
    }

    input, select, textarea {
      font-family: 'Inter', monospace;
      padding: 0.7rem 1rem;
      border: 1.5px solid #d4e2dc;
      border-radius: 16px;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: #fefefe;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2c9c6e;
      box-shadow: 0 0 0 3px rgba(44, 156, 110, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    /* medicine rows */
    .medicines-container {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .medicine-row {
      background: #f9fefb;
      border-radius: 24px;
      padding: 1.2rem;
      border: 1px solid #d9efe6;
      position: relative;
      transition: all 0.1s;
    }

    .medicine-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .medicine-row .full-width {
      grid-column: 1 / -1;
    }

    .remove-medicine {
      background: #fff2f0;
      border: 1px solid #f0cfc9;
      color: #c23d2b;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .remove-medicine:hover {
      background: #ffe0db;
      border-color: #bc5a4a;
    }

    .btn-add {
      background: #eaf9f2;
      border: 1.5px dashed #2c9c6e;
      color: #0f5c5c;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 1rem;
      transition: 0.2s;
    }

    .btn-add:hover {
      background: #d0f0e3;
      border-style: solid;
    }

    .btn-primary, .btn-print {
      background: #0f5c5c;
      border: none;
      color: white;
      padding: 0.9rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .btn-primary:hover {
      background: #0a4747;
      transform: translateY(-1px);
    }

    .btn-print {
      background: #2c6e5c;
      margin-left: 1rem;
    }

    .btn-print:hover {
      background: #1e5a4a;
    }

    .action-buttons {
      margin-top: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: flex-end;
    }

    /* prescription output styling */
    .prescription-output {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0, 32, 32, 0.2);
      padding: 2rem;
      margin-top: 1.5rem;
      transition: all 0.2s;
      border: 1px solid #d0e6dd;
    }

    .prescription-card {
      max-width: 100%;
      font-family: 'Inter', monospace;
    }

    .pres-header {
      text-align: center;
      border-bottom: 2px dashed #bdd9cf;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    .pres-hospital {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f5c5c;
    }

    .pres-doctor {
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .patient-details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap: 0.8rem;
      background: #f3faf7;
      padding: 1rem;
      border-radius: 20px;
      margin-bottom: 1.8rem;
    }

    .med-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.2rem;
      font-size: 0.9rem;
    }

    .med-table th, .med-table td {
      border: 1px solid #cfe3db;
      padding: 0.75rem 0.6rem;
      text-align: left;
      vertical-align: top;
    }

    .med-table th {
      background: #e0f0ea;
      font-weight: 600;
      color: #1c4e42;
    }

    .signature-area {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #cbdcd4;
      font-size: 0.9rem;
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1.2rem;
      color: #708d81;
    }

    .hide {
      display: none;
    }

    /* print styling */
    @media print {
      body {
        background: white;
        padding: 0.3in;
        margin: 0;
      }
      .no-print {
        display: none !important;
      }
      .prescription-output {
        box-shadow: none;
        padding: 0;
        margin: 0;
        border: none;
      }
      .med-table th, .med-table td {
        border: 1px solid #aaa;
      }
      .action-buttons, .btn-add, .remove-medicine, .btn-primary {
        display: none;
      }
      .prescription-output .btn-print {
        display: none;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 1rem;
      }
      .form-card, .prescription-output {
        padding: 1.2rem;
      }
      .hospital-name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Hospital & Doctor Info (prominent) -->
  <div class="hospital-header no-print">
    <div class="hospital-name">🏥 SANJIVANI HOSPITAL</div>
    <div class="hospital-location">Pune, Maharashtra, India</div>
    <div class="doctor-details">
      <span class="doctor-name">👨‍⚕️ Dr. Pankaj Patil</span>
      <span class="doctor-spec">Specialty: General Physician</span>
      <span class="doctor-contact">📞 +91 20 6745 8900  |  ✉️ dr.pankaj@sanjivanihospital.com</span>
    </div>
  </div>

  <!-- Patient Information Form -->
  <div class="form-card no-print">
    <div class="section-title">📋 Patient Details</div>
    <div class="form-grid">
      <div class="input-group"><label class="required">Full Name</label><input type="text" id="patientName" placeholder="e.g., Sunita Sharma" autocomplete="off"></div>
      <div class="input-group"><label class="required">Age (Years)</label><input type="number" id="patientAge" min="0" step="1" placeholder="e.g., 45"></div>
      <div class="input-group"><label class="required">Weight (kg)</label><input type="number" id="patientWeight" step="0.1" placeholder="e.g., 68.5"></div>
      <div class="input-group"><label>Gender</label><select id="patientGender"><option>Male</option><option>Female</option><option>Other</option></select></div>
      <div class="input-group"><label>Consultation Date</label><input type="date" id="consultDate"></div>
      <div class="input-group"><label>Contact No (optional)</label><input type="tel" id="patientPhone" placeholder="+91 9876543210"></div>
      <div class="input-group full-width"><label>Address (optional)</label><textarea id="patientAddress" rows="2" placeholder="Street, City, Pincode"></textarea></div>
    </div>
  </div>

  <!-- Dynamic Medicines Section -->
  <div class="form-card no-print">
    <div class="section-title">💊 Prescription Details (Medicines)</div>
    <div id="medicinesContainer" class="medicines-container">
      <!-- default medicine row injected via JS -->
    </div>
    <button type="button" id="addMedicineBtn" class="btn-add">+ Add Another Medicine</button>
  </div>

  <!-- Additional Fields: Diagnosis, Advice, Follow-up -->
  <div class="form-card no-print">
    <div class="section-title">📝 Clinical Notes</div>
    <div class="form-grid">
      <div class="input-group"><label>Diagnosis / Reason for visit</label><textarea id="diagnosis" rows="3" placeholder="e.g., Upper respiratory infection, fever, cough"></textarea></div>
      <div class="input-group"><label>Additional Instructions / Advice</label><textarea id="advice" rows="3" placeholder="Diet, rest, precautions, etc."></textarea></div>
      <div class="input-group"><label>Follow-up Date (optional)</label><input type="date" id="followUpDate"></div>
    </div>
    <div class="action-buttons">
      <button id="generatePrescriptionBtn" class="btn-primary">✨ Generate Prescription</button>
    </div>
  </div>

  <!-- Prescription Output area (visible after generate) -->
  <div id="prescriptionOutputArea" class="prescription-output hide">
    <!-- dynamic prescription content will be injected -->
  </div>
</div>

<script>
  (function() {
    // DOM elements
    const medicinesContainer = document.getElementById('medicinesContainer');
    const addMedicineBtn = document.getElementById('addMedicineBtn');
    const generateBtn = document.getElementById('generatePrescriptionBtn');
    const outputArea = document.getElementById('prescriptionOutputArea');

    // Helper: set default consultation date to today
    const today = new Date().toISOString().split('T')[0];
    const consultDateInput = document.getElementById('consultDate');
    if(consultDateInput) consultDateInput.value = today;

    // Helper: generate unique ID for rows (not critical but useful)
    let rowCounter = 0;
    
    // Function to create a fresh medicine row (with remove capability)
    function createMedicineRow() {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'medicine-row';
      rowDiv.setAttribute('data-row-id', rowCounter++);
      
      // Fields grid
      const fieldsGrid = document.createElement('div');
      fieldsGrid.className = 'medicine-fields';
      
      // Medicine Name (required)
      const nameGroup = document.createElement('div');
      nameGroup.className = 'input-group';
      nameGroup.innerHTML = `<label class="required">Medicine Name</label><input type="text" class="med-name" placeholder="e.g., Paracetamol" autocomplete="off">`;
      
      // Dosage
      const dosageGroup = document.createElement('div');
      dosageGroup.className = 'input-group';
      dosageGroup.innerHTML = `<label>Dosage</label><input type="text" class="med-dosage" placeholder="500 mg / 1 tab">`;
      
      // Frequency
      const freqGroup = document.createElement('div');
      freqGroup.className = 'input-group';
      freqGroup.innerHTML = `<label>Frequency</label><input type="text" class="med-freq" placeholder="BD / After food / OD">`;
      
      // Duration (number, days)
      const durationGroup = document.createElement('div');
      durationGroup.className = 'input-group';
      durationGroup.innerHTML = `<label>Duration (days)</label><input type="number" class="med-duration" min="1" placeholder="e.g., 7">`;
      
      // Instructions (textarea)
      const instrGroup = document.createElement('div');
      instrGroup.className = 'input-group full-width';
      instrGroup.innerHTML = `<label>Instructions / Remarks (optional)</label><textarea class="med-instructions" rows="2" placeholder="Take with water, after meal..."></textarea>`;
      
      fieldsGrid.appendChild(nameGroup);
      fieldsGrid.appendChild(dosageGroup);
      fieldsGrid.appendChild(freqGroup);
      fieldsGrid.appendChild(durationGroup);
      fieldsGrid.appendChild(instrGroup);
      
      // remove button
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'remove-medicine';
      removeBtn.innerHTML = '🗑️ Remove medicine';
      removeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        rowDiv.remove();
        // optional: ensure at least one row? better allow zero, but validation requires at least one medicine, anyway we prevent no rows? However user can delete all, but add button can create new.
        // If all rows are deleted, user can add; we keep validation to ensure at least one med exists.
        // No auto-add after delete, but we prevent error by checking count in generate.
      });
      
      rowDiv.appendChild(fieldsGrid);
      rowDiv.appendChild(removeBtn);
      return rowDiv;
    }

    // Initialize with one medicine row
    function initMedicineRows() {
      medicinesContainer.innerHTML = '';
      medicinesContainer.appendChild(createMedicineRow());
    }
    
    // Add new medicine row
    function addMedicineRow() {
      medicinesContainer.appendChild(createMedicineRow());
    }
    
    // Validation before prescription generation
    function validateForm() {
      // patient required fields
      const patName = document.getElementById('patientName').value.trim();
      const patAge = document.getElementById('patientAge').value.trim();
      const patWeight = document.getElementById('patientWeight').value.trim();
      
      if(!patName) { alert("❌ Patient Name is required."); return false; }
      if(!patAge || isNaN(parseFloat(patAge)) || parseFloat(patAge) <= 0) { alert("❌ Please enter valid Age (positive number)."); return false; }
      if(!patWeight || isNaN(parseFloat(patWeight)) || parseFloat(patWeight) <= 0) { alert("❌ Weight is required and must be positive."); return false; }
      
      // at least one medicine row, and each medicine name non-empty
      const medicineRows = document.querySelectorAll('.medicine-row');
      if(medicineRows.length === 0) {
        alert("❌ Please add at least one medicine.");
        return false;
      }
      
      let allValid = true;
      let firstEmptyName = false;
      medicineRows.forEach((row, idx) => {
        const medNameInput = row.querySelector('.med-name');
        const medName = medNameInput ? medNameInput.value.trim() : '';
        if(!medName) {
          allValid = false;
          firstEmptyName = true;
          medNameInput?.focus();
        }
      });
      if(!allValid) {
        alert("❌ Each medicine must have a Medicine Name. Please fill all medicine names.");
        return false;
      }
      return true;
    }
    
    // Collect medicine data from rows
    function getMedicinesArray() {
      const rows = document.querySelectorAll('.medicine-row');
      const medicines = [];
      rows.forEach(row => {
        const name = row.querySelector('.med-name')?.value.trim() || '';
        const dosage = row.querySelector('.med-dosage')?.value.trim() || '';
        const frequency = row.querySelector('.med-freq')?.value.trim() || '';
        const duration = row.querySelector('.med-duration')?.value.trim() || '';
        const instructions = row.querySelector('.med-instructions')?.value.trim() || '';
        if(name) {  // only if medicine name exists (validated anyway)
          medicines.push({ name, dosage, frequency, duration, instructions });
        }
      });
      return medicines;
    }
    
    // Generate full prescription HTML
    function buildPrescriptionHTML() {
      // Patient data
      const patientName = document.getElementById('patientName').value.trim();
      const patientAge = document.getElementById('patientAge').value.trim();
      const patientWeight = document.getElementById('patientWeight').value.trim();
      const patientGender = document.getElementById('patientGender').value;
      const consultDate = document.getElementById('consultDate').value || today;
      const patientPhone = document.getElementById('patientPhone').value.trim();
      const patientAddress = document.getElementById('patientAddress').value.trim();
      const diagnosis = document.getElementById('diagnosis').value.trim() || '—';
      const advice = document.getElementById('advice').value.trim() || '—';
      const followUp = document.getElementById('followUpDate').value || 'Not specified';
      
      const medicines = getMedicinesArray();
      
      // Build medicine table rows
      let medRowsHtml = '';
      medicines.forEach(med => {
        const durationDisplay = med.duration ? `${med.duration} day(s)` : '—';
        medRowsHtml += `<tr>
          <td>${escapeHtml(med.name)}</td>
          <td>${escapeHtml(med.dosage) || '—'}</td>
          <td>${escapeHtml(med.frequency) || '—'}</td>
          <td>${durationDisplay}</td>
          <td>${escapeHtml(med.instructions) || '—'}</td>
        </tr>`;
      });
      
      // Patient details block
      const contactInfo = patientPhone ? `📞 ${escapeHtml(patientPhone)}` : '—';
      const addressInfo = patientAddress ? escapeHtml(patientAddress) : '—';
      
      const prescriptionHtml = `
        <div class="prescription-card" id="printablePrescription">
          <div class="pres-header">
            <div class="pres-hospital">🏥 SANJIVANI HOSPITAL</div>
            <div>Pune, Maharashtra, India</div>
            <div class="pres-doctor">👨‍⚕️ Dr. Pankaj Patil  |  General Physician</div>
            <div style="font-size:0.8rem; margin-top:5px;">📞 +91 20 6745 8900  |  ✉️ dr.pankaj@sanjivanihospital.com</div>
          </div>
          
          <div class="patient-details-grid">
            <div><strong>Patient Name:</strong> ${escapeHtml(patientName)}</div>
            <div><strong>Age / Gender:</strong> ${escapeHtml(patientAge)} yrs / ${escapeHtml(patientGender)}</div>
            <div><strong>Weight:</strong> ${escapeHtml(patientWeight)} kg</div>
            <div><strong>Consultation Date:</strong> ${escapeHtml(consultDate)}</div>
            <div><strong>Contact:</strong> ${contactInfo}</div>
            <div><strong>Address:</strong> ${addressInfo}</div>
          </div>
          
          <h4 style="margin: 1rem 0 0.5rem 0; color:#0f5c5c;">📋 Prescribed Medicines</h4>
          <table class="med-table">
            <thead>
              <tr><th>Medicine Name</th><th>Dosage</th><th>Frequency</th><th>Duration</th><th>Instructions</th></tr>
            </thead>
            <tbody>
              ${medRowsHtml || '<tr><td colspan="5" style="text-align:center;">No medicines prescribed</td></tr>'}
            </tbody>
          </table>
          
          <div style="margin: 1rem 0; display:flex; flex-wrap:wrap; gap:1.5rem; justify-content:space-between;">
            <div style="flex:1; background:#F9FCFB; padding:0.8rem; border-radius:16px;"><strong>🩺 Diagnosis:</strong><br>${escapeHtml(diagnosis)}</div>
            <div style="flex:1; background:#F9FCFB; padding:0.8rem; border-radius:16px;"><strong>📌 Advice & Instructions:</strong><br>${escapeHtml(advice)}</div>
          </div>
          <div><strong>📅 Follow-up Date:</strong> ${escapeHtml(followUp)}</div>
          
          <div class="signature-area">
            <div><strong>Doctor's Signature:</strong> <span style="border-bottom: 1px solid #333; width:200px; display:inline-block; min-width:160px;">Dr. Pankaj Patil</span></div>
            <div><strong>Date:</strong> ${new Date().toLocaleDateString('en-IN')}</div>
          </div>
          <div class="footer-note">This is a computer generated e-prescription. Valid with doctor's digital signature.</div>
        </div>
        <div style="text-align: right; margin-top: 20px;" class="no-print">
          <button id="printPrescriptionBtn" class="btn-print">🖨️ Print / Save as PDF</button>
        </div>
      `;
      
      return prescriptionHtml;
    }
    
    // simple XSS safe helper
    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // Render prescription and attach print handler
    function renderAndShowPrescription() {
      if(!validateForm()) return false;
      const prescriptionHTML = buildPrescriptionHTML();
      outputArea.innerHTML = prescriptionHTML;
      outputArea.classList.remove('hide');
      
      // Attach print event to the newly created print button
      const printBtn = document.getElementById('printPrescriptionBtn');
      if(printBtn) {
        // remove previous listener if any
        const newPrintBtn = printBtn.cloneNode(true);
        printBtn.parentNode.replaceChild(newPrintBtn, printBtn);
        newPrintBtn.addEventListener('click', function(e) {
          e.preventDefault();
          window.print();
        });
      }
      // scroll to prescription
      outputArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return true;
    }
    
    // event binding for Add Medicine
    addMedicineBtn.addEventListener('click', () => {
      addMedicineRow();
    });
    
    // generate button
    generateBtn.addEventListener('click', (e) => {
      e.preventDefault();
      renderAndShowPrescription();
    });
    
    // Additional: Handle initialize, make default consultation date
    initMedicineRows();
    
    // optional if any extra validations for weight, age non-negative
    const ageInput = document.getElementById('patientAge');
    const weightInput = document.getElementById('patientWeight');
    [ageInput, weightInput].forEach(inp => {
      if(inp) inp.addEventListener('input', function() {
        if(this.value < 0) this.value = 0;
      });
    });
    
    // Real-time optional: ensure prescription view updates if needed but only after generate.
  })();
</script>
</body>
</html>
